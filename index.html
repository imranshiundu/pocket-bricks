<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#121212" />
    <meta name="application-name" content="Pocket Bricks" />
    <meta name="apple-mobile-web-app-title" content="Pocket Bricks" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Pocket Bricks is an open-source old-phone-style falling-block puzzle game rebuilt as a real smartphone APK." />
    <title>Pocket Bricks</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icon.svg" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="game" aria-label="Pocket Bricks game">
      <section class="screen-shell">
        <div class="screen-frame">
          <div class="screen-head">
            <div class="hud-card">
              <span class="hud-label">SCORE</span>
              <strong id="score">000000</strong>
            </div>
            <div class="hud-card">
              <span class="hud-label">BEST</span>
              <strong id="best">000000</strong>
            </div>
          </div>

          <div class="play-layout">
            <canvas id="board" width="240" height="480" aria-label="Game board"></canvas>
            <aside class="side-panel" aria-label="Game statistics">
              <div>
                <span class="hud-label">NEXT</span>
                <canvas id="next" width="76" height="76" aria-label="Next brick"></canvas>
              </div>
              <div class="stacked-stat">
                <span class="hud-label">LINES</span>
                <strong id="lines">000</strong>
              </div>
              <div class="stacked-stat">
                <span class="hud-label">LEVEL</span>
                <strong id="level">01</strong>
              </div>
            </aside>
          </div>

          <p id="status" class="status" role="status" aria-live="polite">READY — PRESS START</p>
        </div>
      </section>

      <section class="memory-strip" aria-label="Local memory">
        <div class="memory-card">
          <span>LAST</span>
          <strong id="lastScore">000000</strong>
        </div>
        <div class="memory-card">
          <span>PLAYS</span>
          <strong id="gamesPlayed">000</strong>
        </div>
        <div class="memory-card">
          <span>TOP LV</span>
          <strong id="bestLevel">01</strong>
        </div>
      </section>

      <section id="updatePanel" class="install-strip" aria-label="Pocket Bricks updates">
        <button id="updateBtn" class="install-button" type="button">GET UPDATE</button>
        <p id="updateHelp" class="install-help">A newer APK is available on GitHub.</p>
      </section>

      <section id="installPanel" class="install-strip" aria-label="Install Pocket Bricks">
        <button id="installBtn" class="install-button" type="button">INSTALL APP</button>
        <p id="installHelp" class="install-help">Install to home screen for full app mode.</p>
      </section>

      <section class="meta-controls" aria-label="Game controls">
        <button id="startBtn" class="pill-button" data-action="start" type="button">START</button>
        <button id="pauseBtn" class="pill-button" data-action="pause" type="button">PAUSE</button>
        <button id="soundBtn" class="pill-button" type="button">SOUND ON</button>
      </section>

      <section class="keypad" aria-label="Touch keypad">
        <div class="dpad" aria-label="Directional pad">
          <button class="key key-up" data-action="rotate" type="button" aria-label="Rotate">ROT</button>
          <button class="key key-left" data-action="left" type="button" aria-label="Move left">LEFT</button>
          <button class="key key-right" data-action="right" type="button" aria-label="Move right">RIGHT</button>
          <button class="key key-down" data-action="down" type="button" aria-label="Move down">DOWN</button>
        </div>
        <button class="fire-key" data-action="drop" type="button" aria-label="Hard drop">DROP</button>
      </section>

      <footer class="help-text">
        Android APK ready. Keyboard: arrows or 4/5/6/8. Space drops. P pauses.
      </footer>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
