name: Build Native Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'android-*'
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build installable APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native-android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p ../dist
          cp app/build/outputs/apk/debug/app-debug.apk ../dist/Pocket-Bricks.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pocket-Bricks-APK
          path: dist/Pocket-Bricks.apk

      - name: Publish APK on release tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Pocket-Bricks.apk
          generate_release_notes: true
