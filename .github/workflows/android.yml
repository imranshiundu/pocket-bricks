name: Build Android APK

# Manual/tag based so normal code pushes do not spam failed Actions emails.
on:
  workflow_dispatch:
    inputs:
      publish_latest:
        description: "Attach this APK to the android-latest GitHub Release"
        required: false
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  apk:
    name: Build installable APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Stage web assets for Capacitor
        run: npm run build:android-web

      - name: Generate Android project
        run: |
          rm -rf android
          npx cap add android --no-open

      - name: Sync Android project
        run: npx cap sync android --no-open

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk pocket-bricks-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocket-bricks-debug-apk
          path: pocket-bricks-debug.apk
          if-no-files-found: error

      - name: Attach APK to version tag release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" pocket-bricks-debug.apk \
            --title "Pocket Bricks ${GITHUB_REF_NAME}" \
            --notes "Installable Android APK for Pocket Bricks." \
            --latest

      - name: Attach APK to android-latest release
        if: github.event_name == 'workflow_dispatch' && inputs.publish_latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete android-latest --yes --cleanup-tag || true
          gh release create android-latest pocket-bricks-debug.apk \
            --title "Pocket Bricks Android Latest" \
            --notes "Latest installable Android APK. Download pocket-bricks-debug.apk and install it on Android."
