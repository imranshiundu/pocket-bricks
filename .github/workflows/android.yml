name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apk:
    name: Build installable APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Generate Android project
        run: npx cap add android

      - name: Sync Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk pocket-bricks-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocket-bricks-debug-apk
          path: pocket-bricks-debug.apk
          if-no-files-found: error
